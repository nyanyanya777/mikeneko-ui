[build]
  publish = "."
  command = "echo 'Static site — no build needed'"

# Redirect root to showcase
[[redirects]]
  from = "/"
  to = "/docs/"
  status = 301

# Pretty URLs for docs
[[redirects]]
  from = "/docs"
  to = "/docs/index.html"
  status = 200

[[redirects]]
  from = "/icons"
  to = "/docs/icons.html"
  status = 200

# Cache static assets
[[headers]]
  for = "/scripts/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=86400"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, s-maxage=604800"

[[headers]]
  for = "/docs/Meltan.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
