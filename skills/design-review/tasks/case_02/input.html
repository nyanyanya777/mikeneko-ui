<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ユーザー設定</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <div class="max-w-7xl mx-auto px-8 py-12">
    <!-- ページヘッダー -->
    <h1 class="text-3xl font-bold text-slate-900 mb-2">アカウント設定</h1>
    <p class="text-body mb-8">プロフィールと通知の設定を管理します</p>

    <!-- タブナビゲーション -->
    <div class="border-b border-slate-200 mb-8">
      <nav class="flex gap-6" aria-label="設定タブ">
        <button class="text-sm font-semibold text-primary-600 border-b-2 border-primary-600 pb-3">プロフィール</button>
        <button class="text-sm font-medium text-slate-500 border-b-2 border-transparent pb-3 hover:text-slate-700">通知</button>
        <button class="text-sm font-medium text-slate-500 border-b-2 border-transparent pb-3 hover:text-slate-700">セキュリティ</button>
      </nav>
    </div>

    <!-- フォーム -->
    <div class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
      <h2 class="text-xl font-semibold text-slate-900 mb-6">プロフィール情報</h2>

      <form>
        <!-- 名前（横並び） -->
        <div class="flex gap-4 mb-6">
          <div class="flex-1">
            <label class="block text-sm font-medium text-slate-700 mb-1">姓</label>
            <input type="text" value="山田" class="w-full px-3 py-2 text-base border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500/50 caret-primary-600">
          </div>
          <div class="flex-1">
            <label class="block text-sm font-medium text-slate-700 mb-1">名</label>
            <input type="text" value="太郎" class="w-full px-3 py-2 text-base border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500/50 caret-primary-600">
          </div>
        </div>

        <!-- メールアドレス -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-slate-700 mb-1">メールアドレス</label>
          <input type="email" value="yamada@example.com" class="w-full px-3 py-2 text-base border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500/50 caret-primary-600">
        </div>

        <!-- 部署セレクト -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-slate-700 mb-1" for="dept">部署</label>
          <select id="dept" class="w-full px-3 py-2 text-base border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500/50">
            <option>エンジニアリング</option>
            <option>デザイン</option>
            <option>マーケティング</option>
            <option>営業</option>
          </select>
        </div>

        <!-- 役職 -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-slate-700 mb-1">役職</label>
          <input type="text" placeholder="役職を入力してください" class="w-full px-3 py-2 text-base border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500/50 caret-primary-600">
        </div>

        <!-- 自己紹介 -->
        <div class="mb-6">
          <label class="block text-sm font-medium text-slate-700 mb-1">自己紹介</label>
          <textarea rows="4" class="w-full px-3 py-2 text-base border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500/50 caret-primary-600 tracking-tight" placeholder="自己紹介を入力してください"></textarea>
        </div>

        <!-- 通知設定（チェックボックスグループ） -->
        <div class="mb-6">
          <p class="text-sm font-medium text-slate-700 mb-3">メール通知</p>
          <div class="space-y-3">
            <label class="flex items-center gap-3">
              <input type="checkbox" checked class="w-4 h-4 rounded border-slate-300 text-primary-600">
              <span class="text-sm text-body">タスクの割り当て通知</span>
            </label>
            <label class="flex items-center gap-3">
              <input type="checkbox" checked class="w-4 h-4 rounded border-slate-300 text-primary-600">
              <span class="text-sm text-body">コメント通知</span>
            </label>
            <label class="flex items-center gap-3">
              <input type="checkbox" class="w-4 h-4 rounded border-slate-300 text-primary-600">
              <span class="text-sm text-body">週次サマリー</span>
            </label>
          </div>
        </div>

        <!-- 言語セレクト -->
        <div class="mb-8">
          <label class="block text-sm font-medium text-slate-700 mb-1" for="lang">表示言語</label>
          <div class="relative">
            <select id="lang" class="w-full appearance-none px-3 py-2 pr-10 text-base border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500/50">
              <option>日本語</option>
              <option>English</option>
            </select>
            <svg class="absolute right-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </div>
        </div>

        <!-- ボタン -->
        <div class="flex items-center gap-3">
          <button type="submit" class="bg-primary-600 text-white px-4 py-2 rounded-lg text-base font-medium hover:bg-primary-700 transition-colors duration-500">
            保存する
          </button>
          <button type="button" class="bg-white text-slate-700 border border-slate-200 px-4 py-2 rounded-lg text-base font-medium hover:bg-gray-50 transition-colors">
            キャンセル
          </button>
        </div>
      </form>
    </div>

    <!-- 危険ゾーン -->
    <div class="mt-10 bg-white rounded-xl border border-red-200 p-6 shadow-sm">
      <h2 class="text-xl font-semibold text-red-600 mb-2">アカウント削除</h2>
      <p class="text-body mb-4">アカウントを削除すると、すべてのデータが失われます。この操作は取り消せません。</p>
      <button class="bg-red-600 text-white px-4 py-2 rounded-lg text-base font-medium hover:bg-red-700 transition-colors">
        アカウントを削除する
      </button>
    </div>
  </div>

</body>
</html>
