<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タスク管理 - ダッシュボード</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- サイドバー + メイン -->
  <div class="flex">
    <!-- サイドバー -->
    <aside class="w-60 bg-slate-800 min-h-screen p-4">
      <div class="text-white font-bold text-lg mb-6">TaskFlow</div>
      <nav>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-white bg-white/10 rounded-xl text-sm">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4"/></svg>
          ダッシュボード
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-gray-400 hover:text-white rounded-xl text-sm mt-1">
          <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
          タスク一覧
        </a>
        <a href="#" class="flex items-center gap-3 px-3 py-2 text-gray-400 hover:text-white rounded-xl text-sm mt-1">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          履歴
        </a>
      </nav>
    </aside>

    <!-- メインコンテンツ -->
    <main class="flex-1 p-6">
      <div class="max-w-5xl mx-auto">
        <!-- ページヘッダー -->
        <h1 class="text-3xl font-bold text-black mb-2">ダッシュボード</h1>
        <p class="text-gray-400 mb-8">プロジェクトの概要を確認できます</p>

        <!-- メトリクスカード -->
        <div class="grid grid-cols-4 gap-6 mb-8">
          <div class="bg-white rounded-none p-4 shadow-lg">
            <p class="text-xs text-gray-400">総タスク数</p>
            <p class="text-2xl font-bold text-black mt-1">128</p>
            <div class="mt-2 bg-slate-200 rounded-full h-2">
              <div class="bg-primary-600 rounded-full h-2 w-3/4"></div>
            </div>
          </div>
          <div class="bg-white rounded-none p-4 shadow-lg">
            <p class="text-xs text-gray-400">完了</p>
            <p class="text-2xl font-bold text-black mt-1">96</p>
            <span class="bg-green-50 text-green-700 px-2 py-0.5 rounded-full text-xs font-medium">75%</span>
          </div>
          <div class="bg-white rounded-none p-4 shadow-lg">
            <p class="text-xs text-gray-400">進行中</p>
            <p class="text-2xl font-bold text-black mt-1">24</p>
            <span class="bg-yellow-50 text-yellow-700 px-2 py-0.5 rounded-full text-xs font-medium">進行中</span>
          </div>
          <div class="bg-white rounded-none p-4 shadow-lg">
            <p class="text-xs text-gray-400">未着手</p>
            <p class="text-2xl font-bold text-black mt-1">8</p>
            <span class="bg-rose-50 text-rose-700 px-2 py-0.5 rounded-full text-xs font-medium">未着手</span>
          </div>
        </div>

        <!-- タスク一覧テーブル -->
        <div class="bg-white rounded-xl border border-gray-100 shadow-sm">
          <div class="p-6">
            <div class="flex items-center justify-between mb-4">
              <h2 class="text-xl font-semibold text-black">最近のタスク</h2>
              <button class="bg-primary-400 text-white px-3 py-0.5 rounded-lg text-sm font-medium">
                新規作成
              </button>
            </div>
            <table class="min-w-full">
              <thead>
                <tr class="border-b border-gray-100">
                  <th class="text-left py-3 text-sm font-medium text-slate-500">タスク名</th>
                  <th class="text-left py-3 text-sm font-medium text-slate-500">担当者</th>
                  <th class="text-left py-3 text-sm font-medium text-slate-500">ステータス</th>
                  <th class="text-left py-3 text-sm font-medium text-slate-500">期限</th>
                </tr>
              </thead>
              <tbody>
                <tr class="border-b border-gray-100">
                  <td class="py-3 text-sm text-black">LP デザイン作成</td>
                  <td class="py-3 text-sm text-gray-400">田中太郎</td>
                  <td class="py-3"><span class="bg-green-50 text-green-700 px-2.5 py-0.5 rounded-full text-xs font-medium">完了</span></td>
                  <td class="py-3 text-sm text-gray-400">2026-03-15</td>
                </tr>
                <tr class="border-b border-gray-100">
                  <td class="py-3 text-sm text-black">API設計書レビュー</td>
                  <td class="py-3 text-sm text-gray-400">鈴木花子</td>
                  <td class="py-3"><span class="bg-yellow-50 text-yellow-700 px-2.5 py-0.5 rounded-full text-xs font-medium">進行中</span></td>
                  <td class="py-3 text-sm text-gray-400">2026-03-20</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- フォーム -->
        <div class="mt-8 bg-white rounded-xl border border-slate-200 p-6 shadow-sm">
          <h2 class="text-xl font-semibold text-slate-900 mb-4">クイック追加</h2>
          <div class="flex items-end gap-4">
            <div class="flex-1">
              <input type="text" placeholder="タスク名を入力" class="w-full px-3 py-2 text-base border border-slate-300 rounded-lg focus:outline-none">
            </div>
            <div>
              <select class="px-3 py-2 text-base border border-slate-300 rounded-lg">
                <option>優先度: 高</option>
                <option>優先度: 中</option>
                <option>優先度: 低</option>
              </select>
            </div>
            <button class="bg-primary-600 text-white px-4 py-2 rounded-lg text-base font-medium hover:bg-primary-700">
              追加
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>

</body>
</html>
