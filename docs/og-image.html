<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>OG Image Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    font-family: 'Inter', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    background: #f9fafb;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .mesh {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.12;
    background: #2b70ef;
  }
  .blob-1 { width: 600px; height: 600px; top: -200px; left: -100px; }
  .blob-2 { width: 500px; height: 500px; bottom: -200px; right: -100px; opacity: 0.08; }
  .card {
    position: relative;
    z-index: 1;
    width: 1080px;
    height: 510px;
    background: #ffffff;
    border-radius: 24px;
    border: 1px solid #e2e8f0;
    box-shadow: 0 8px 32px -8px rgba(43, 112, 239, 0.15), 0 1px 2px 0 rgb(0 0 0 / 0.05);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 48px;
  }
  .logo-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo-ring {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    border: 1px solid #e2e8f0;
    box-shadow: 0 0 0 4px rgba(43, 112, 239, 0.12);
    overflow: hidden;
    background: #fff;
    padding: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-ring img {
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
  }
  .logo-text {
    font-size: 52px;
    font-weight: 800;
    color: #0f172a;
    letter-spacing: -0.02em;
  }
  .tagline {
    font-size: 26px;
    font-weight: 500;
    color: #3d4b5f;
    text-align: center;
    line-height: 1.5;
  }
  .highlight {
    background: linear-gradient(135deg, #2250df 0%, #6492ff 40%, #95b6ff 70%, #2250df 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 700;
  }
  .badges {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 9999px;
    font-size: 15px;
    font-weight: 600;
    background: #f0f5ff;
    color: #2250df;
  }
  .badge-neutral {
    background: #f1f5f9;
    color: #64748b;
  }
  .url {
    font-size: 16px;
    font-weight: 500;
    color: #94a3b8;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <div class="mesh">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>
  <div class="card">
    <div class="logo-row">
      <div class="logo-ring">
        <img src="Meltan.svg" alt="melta UI">
      </div>
      <span class="logo-text">melta UI</span>
    </div>
    <p class="tagline">
      人間にも、AIにも、読める<span class="highlight">デザインシステム</span>
    </p>
    <div class="badges">
      <span class="badge">28 Components</span>
      <span class="badge">106 Tokens</span>
      <span class="badge">MCP Server</span>
      <span class="badge badge-neutral">Tailwind CSS</span>
      <span class="badge badge-neutral">Claude Code / Cursor</span>
    </div>
    <span class="url">melta.tsubotax.com</span>
  </div>
</body>
</html>
