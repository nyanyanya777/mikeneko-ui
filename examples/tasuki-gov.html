<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="../assets/Meltan_favicon.svg" type="image/svg+xml">
  <title>たすき行政窓口 - 申請者情報</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --primary-50: #f8fafc;
      --primary-100: #f1f5f9;
      --primary-200: #e2e8f0;
      --primary-300: #cbd5e1;
      --primary-400: #94a3b8;
      --primary-500: #64748b;
      --primary-500: #475569;
      --primary-700: #334155;
      --primary-800: #1e293b;
      --primary-900: #0f172a;
      --primary-950: #020617;
    }
    body {
      font-family: 'Inter', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      line-height: 2.0;
      letter-spacing: 0.02em;
    }
    h1, h2, h3, h4, h5, h6 {
      line-height: 1.4;
      letter-spacing: 0.01em;
    }
    .text-body { color: #3d4b5f; }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50: 'var(--primary-50)', 100: 'var(--primary-100)', 200: 'var(--primary-200)',
              300: 'var(--primary-300)', 400: 'var(--primary-400)', 500: 'var(--primary-500)',
              600: 'var(--primary-500)', 700: 'var(--primary-700)', 800: 'var(--primary-800)',
              900: 'var(--primary-900)', 950: 'var(--primary-950)',
            },
            body: '#3d4b5f',
          },
          fontFamily: {
            sans: ['Inter', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'sans-serif']
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gray-50 min-h-screen text-body">

  <!-- Header -->
  <header class="bg-white border-b border-slate-200">
    <div class="max-w-5xl mx-auto px-6 flex items-center justify-between h-16">
      <div class="flex items-center gap-3">
        <!-- Seal/crest icon -->
        <svg class="w-9 h-9 text-primary-700" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="18" cy="18" r="17" stroke="currentColor" stroke-width="2" fill="none"/>
          <circle cx="18" cy="18" r="12" stroke="currentColor" stroke-width="1.5" fill="none"/>
          <path d="M18 8v20M8 18h20M11.5 11.5l13 13M24.5 11.5l-13 13" stroke="currentColor" stroke-width="1" opacity="0.5"/>
          <circle cx="18" cy="18" r="3" fill="currentColor"/>
        </svg>
        <div class="flex flex-col">
          <span class="text-base font-bold text-slate-900 leading-tight">たすき行政窓口</span>
          <span class="text-xs text-slate-500 leading-tight">オンライン申請サービス</span>
        </div>
      </div>
      <a href="#" class="text-sm font-medium text-slate-500 hover:text-slate-700 transition-colors cursor-pointer">ログアウト</a>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-2xl mx-auto px-6 py-10">

    <!-- Stepper -->
    <div class="flex items-center mb-10" role="group" aria-label="申請ステップ">
      <!-- Step 1: Completed -->
      <div class="flex flex-col items-center">
        <div class="bg-primary-500 text-white w-8 h-8 rounded-full inline-flex items-center justify-center text-sm font-medium">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
          </svg>
        </div>
        <span class="text-xs text-primary-500 font-medium mt-1.5 whitespace-nowrap">申請種類</span>
      </div>
      <!-- Connector: completed -->
      <div class="flex-1 h-0.5 mx-3 bg-primary-500 mb-5"></div>
      <!-- Step 2: Active -->
      <div class="flex flex-col items-center">
        <div class="border-2 border-primary-500 text-primary-500 w-8 h-8 rounded-full inline-flex items-center justify-center text-sm font-medium" aria-current="step">2</div>
        <span class="text-xs text-primary-500 font-medium mt-1.5 whitespace-nowrap">申請者情報</span>
      </div>
      <!-- Connector: upcoming -->
      <div class="flex-1 h-0.5 mx-3 bg-slate-200 mb-5"></div>
      <!-- Step 3: Upcoming -->
      <div class="flex flex-col items-center">
        <div class="bg-slate-100 text-slate-500 w-8 h-8 rounded-full inline-flex items-center justify-center text-sm font-medium">3</div>
        <span class="text-xs text-slate-500 mt-1.5 whitespace-nowrap">添付書類</span>
      </div>
      <!-- Connector: upcoming -->
      <div class="flex-1 h-0.5 mx-3 bg-slate-200 mb-5"></div>
      <!-- Step 4: Upcoming -->
      <div class="flex flex-col items-center">
        <div class="bg-slate-100 text-slate-500 w-8 h-8 rounded-full inline-flex items-center justify-center text-sm font-medium">4</div>
        <span class="text-xs text-slate-500 mt-1.5 whitespace-nowrap">確認・送信</span>
      </div>
    </div>

    <!-- Breadcrumb -->
    <nav aria-label="パンくずリスト" class="mb-6">
      <ol class="flex items-center gap-2 text-sm">
        <li><a href="#" class="text-slate-500 hover:text-slate-700 cursor-pointer">ホーム</a></li>
        <li aria-hidden="true">
          <svg class="w-4 h-4 text-slate-400 inline" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
          </svg>
        </li>
        <li><a href="#" class="text-slate-500 hover:text-slate-700 cursor-pointer">住所変更届</a></li>
        <li aria-hidden="true">
          <svg class="w-4 h-4 text-slate-400 inline" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
          </svg>
        </li>
        <li><span class="text-slate-900 font-medium" aria-current="page">申請者情報</span></li>
      </ol>
    </nav>

    <!-- Page Title -->
    <h1 class="text-3xl font-bold text-slate-900 mb-8">申請者情報の入力</h1>

    <!-- Form Card -->
    <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
      <form>
        <!-- Section: 基本情報 -->
        <div class="p-6">
          <h2 class="text-lg font-bold text-slate-900 mb-5">基本情報</h2>

          <!-- 氏名 (姓 + 名 inline) -->
          <div class="grid grid-cols-2 gap-4 mb-5">
            <div class="leading-normal">
              <label for="last-name" class="block text-sm font-medium text-slate-900 mb-1.5">
                姓 <span class="text-red-600 text-xs">*必須</span>
              </label>
              <input type="text" id="last-name" placeholder="山田" required
                class="w-full px-3 py-2 text-base border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500/50 caret-primary-500">
            </div>
            <div class="leading-normal">
              <label for="first-name" class="block text-sm font-medium text-slate-900 mb-1.5">
                名 <span class="text-red-600 text-xs">*必須</span>
              </label>
              <input type="text" id="first-name" placeholder="太郎" required
                class="w-full px-3 py-2 text-base border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500/50 caret-primary-500">
            </div>
          </div>

          <!-- フリガナ (セイ + メイ inline) -->
          <div class="grid grid-cols-2 gap-4 mb-5">
            <div class="leading-normal">
              <label for="last-name-kana" class="block text-sm font-medium text-slate-900 mb-1.5">
                セイ <span class="text-red-600 text-xs">*必須</span>
              </label>
              <input type="text" id="last-name-kana" placeholder="ヤマダ" required
                class="w-full px-3 py-2 text-base border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500/50 caret-primary-500">
            </div>
            <div class="leading-normal">
              <label for="first-name-kana" class="block text-sm font-medium text-slate-900 mb-1.5">
                メイ <span class="text-red-600 text-xs">*必須</span>
              </label>
              <input type="text" id="first-name-kana" placeholder="タロウ" required
                class="w-full px-3 py-2 text-base border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500/50 caret-primary-500">
            </div>
          </div>

          <!-- 生年月日 (year / month / day selects) -->
          <div class="mb-0">
            <span class="block text-sm font-medium text-slate-900 mb-1.5">
              生年月日 <span class="text-red-600 text-xs">*必須</span>
            </span>
            <div class="flex items-center gap-2">
              <div class="leading-normal relative w-28">
                <label for="birth-year" class="sr-only">年</label>
                <select id="birth-year" required
                  class="appearance-none w-full bg-white pl-3 pr-8 py-2 text-base border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500/50 cursor-pointer">
                  <option value="">年</option>
                  <option>1960</option><option>1965</option><option>1970</option><option>1975</option>
                  <option>1980</option><option>1985</option><option selected>1990</option>
                  <option>1995</option><option>2000</option><option>2005</option>
                </select>
                <svg class="absolute right-2 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
                </svg>
              </div>
              <span class="text-sm text-slate-500">年</span>
              <div class="leading-normal relative w-20">
                <label for="birth-month" class="sr-only">月</label>
                <select id="birth-month" required
                  class="appearance-none w-full bg-white pl-3 pr-8 py-2 text-base border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500/50 cursor-pointer">
                  <option value="">–</option>
                  <option>1</option><option>2</option><option>3</option><option selected>4</option>
                  <option>5</option><option>6</option><option>7</option><option>8</option>
                  <option>9</option><option>10</option><option>11</option><option>12</option>
                </select>
                <svg class="absolute right-2 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
                </svg>
              </div>
              <span class="text-sm text-slate-500">月</span>
              <div class="leading-normal relative w-20">
                <label for="birth-day" class="sr-only">日</label>
                <select id="birth-day" required
                  class="appearance-none w-full bg-white pl-3 pr-8 py-2 text-base border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500/50 cursor-pointer">
                  <option value="">–</option>
                  <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
                  <option>6</option><option>7</option><option>8</option><option>9</option><option>10</option>
                  <option>11</option><option>12</option><option>13</option><option>14</option><option selected>15</option>
                  <option>16</option><option>17</option><option>18</option><option>19</option><option>20</option>
                  <option>21</option><option>22</option><option>23</option><option>24</option><option>25</option>
                  <option>26</option><option>27</option><option>28</option><option>29</option><option>30</option><option>31</option>
                </select>
                <svg class="absolute right-2 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
                </svg>
              </div>
              <span class="text-sm text-slate-500">日</span>
            </div>
          </div>
        </div>

        <!-- Divider -->
        <hr class="border-t border-slate-200" role="separator">

        <!-- Section: 連絡先 -->
        <div class="p-6">
          <h2 class="text-lg font-bold text-slate-900 mb-5">連絡先</h2>

          <!-- 電話番号 -->
          <div class="mb-5 leading-normal">
            <label for="phone" class="block text-sm font-medium text-slate-900 mb-1.5">
              電話番号 <span class="text-red-600 text-xs">*必須</span>
            </label>
            <input type="tel" id="phone" placeholder="090-1234-5678" required
              class="w-full px-3 py-2 text-base border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500/50 caret-primary-500">
          </div>

          <!-- メールアドレス -->
          <div class="leading-normal">
            <label for="email" class="block text-sm font-medium text-slate-900 mb-1.5">
              メールアドレス <span class="text-red-600 text-xs">*必須</span>
            </label>
            <input type="email" id="email" placeholder="taro.yamada@example.com" required
              class="w-full px-3 py-2 text-base border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500/50 caret-primary-500">
          </div>
        </div>

        <!-- Divider -->
        <hr class="border-t border-slate-200" role="separator">

        <!-- Section: 現住所 -->
        <div class="p-6">
          <h2 class="text-lg font-bold text-slate-900 mb-5">現住所</h2>

          <!-- 郵便番号 + 住所検索ボタン -->
          <div class="mb-5 leading-normal">
            <label for="postal-code" class="block text-sm font-medium text-slate-900 mb-1.5">
              郵便番号 <span class="text-red-600 text-xs">*必須</span>
            </label>
            <div class="flex items-center gap-3">
              <input type="text" id="postal-code" placeholder="000-0000" required
                class="w-40 px-3 py-2 text-base border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500/50 caret-primary-500">
              <button type="button"
                class="inline-flex items-center justify-center gap-2 h-10 px-4 text-[1rem] font-medium bg-white text-slate-700 border border-slate-200 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"/>
                </svg>
                住所検索
              </button>
            </div>
          </div>

          <!-- 都道府県 -->
          <div class="mb-5 leading-normal">
            <label for="prefecture" class="block text-sm font-medium text-slate-900 mb-1.5">
              都道府県 <span class="text-red-600 text-xs">*必須</span>
            </label>
            <div class="relative">
              <select id="prefecture" required
                class="appearance-none w-full bg-white pl-3 pr-10 py-2 text-base border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500/50">
                <option value="">選択してください</option>
                <option>北海道</option><option>青森県</option><option>岩手県</option><option>宮城県</option>
                <option>秋田県</option><option>山形県</option><option>福島県</option><option>茨城県</option>
                <option>栃木県</option><option>群馬県</option><option>埼玉県</option><option>千葉県</option>
                <option selected>東京都</option><option>神奈川県</option><option>新潟県</option><option>富山県</option>
                <option>石川県</option><option>福井県</option><option>山梨県</option><option>長野県</option>
                <option>岐阜県</option><option>静岡県</option><option>愛知県</option><option>三重県</option>
                <option>滋賀県</option><option>京都府</option><option>大阪府</option><option>兵庫県</option>
                <option>奈良県</option><option>和歌山県</option><option>鳥取県</option><option>島根県</option>
                <option>岡山県</option><option>広島県</option><option>山口県</option><option>徳島県</option>
                <option>香川県</option><option>愛媛県</option><option>高知県</option><option>福岡県</option>
                <option>佐賀県</option><option>長崎県</option><option>熊本県</option><option>大分県</option>
                <option>宮崎県</option><option>鹿児島県</option><option>沖縄県</option>
              </select>
              <svg class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
              </svg>
            </div>
          </div>

          <!-- 市区町村 -->
          <div class="mb-5 leading-normal">
            <label for="city" class="block text-sm font-medium text-slate-900 mb-1.5">
              市区町村 <span class="text-red-600 text-xs">*必須</span>
            </label>
            <input type="text" id="city" placeholder="例: 渋谷区" required
              class="w-full px-3 py-2 text-base border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500/50 caret-primary-500">
          </div>

          <!-- 番地 -->
          <div class="leading-normal">
            <label for="address-detail" class="block text-sm font-medium text-slate-900 mb-1.5">
              番地 <span class="text-red-600 text-xs">*必須</span>
            </label>
            <input type="text" id="address-detail" placeholder="例: 神宮前1-2-3 ○○マンション 101号室" required
              class="w-full px-3 py-2 text-base border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary-500/50 caret-primary-500">
          </div>
        </div>
      </form>
    </div>

    <!-- Info Alert -->
    <div role="status" class="flex items-start gap-3 p-4 bg-primary-50 border border-primary-200 text-primary-800 rounded-lg mt-6">
      <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z"/>
      </svg>
      <p class="text-sm">入力内容は一時保存されます。24時間以内に送信してください。</p>
    </div>

    <!-- Bottom Buttons -->
    <div class="flex items-center justify-between mt-8">
      <button type="button"
        class="inline-flex items-center justify-center gap-2 h-12 px-6 text-[1rem] font-medium bg-white text-slate-700 border border-slate-200 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
        戻る
      </button>
      <button type="button"
        class="inline-flex items-center justify-center gap-2 h-12 px-6 text-[1rem] font-medium bg-primary-500 text-white rounded-lg hover:bg-primary-700 cursor-pointer transition-colors">
        次へ進む
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
        </svg>
      </button>
    </div>

  </main>

  <!-- Footer -->
  <footer class="bg-white border-t border-slate-200 mt-12">
    <div class="max-w-5xl mx-auto px-6 py-8">
      <div class="flex items-center justify-between">
        <p class="text-xs text-slate-500">&copy; 2026 たすき行政窓口. All rights reserved.</p>
        <div class="flex items-center gap-4">
          <a href="#" class="text-xs text-slate-500 hover:text-slate-700 cursor-pointer">利用規約</a>
          <a href="#" class="text-xs text-slate-500 hover:text-slate-700 cursor-pointer">プライバシーポリシー</a>
          <a href="#" class="text-xs text-slate-500 hover:text-slate-700 cursor-pointer">アクセシビリティ</a>
        </div>
      </div>
    </div>
  </footer>

</body>
</html>
