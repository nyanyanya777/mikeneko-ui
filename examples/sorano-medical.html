<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="../assets/Meltan_favicon.svg" type="image/svg+xml">
  <title>ソラノ医院 - ご予約</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: {
              50:'#f0fdfa',100:'#ccfbf1',200:'#99f6e4',300:'#5eead4',
              400:'#2dd4bf',500:'#14b8a6',600:'#0d9488',700:'#0f766e',
              800:'#115e59',900:'#134e4a',950:'#042f2e'
            }
          },
          fontFamily: {
            sans: ['Inter','Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP','sans-serif']
          }
        }
      }
    }
  </script>
  <style>
    .text-body { color: #3d4b5f; }
    body { line-height: 2.0; letter-spacing: 0.02em; }
    h1, h2, h3, h4, h5, h6 { line-height: 1.4; letter-spacing: 0.01em; }
    input[type="radio"] { accent-color: #0d9488; }
    .slot-btn:not(.slot-unavailable):hover {
      background-color: #f0fdfa;
      border-color: #0d9488;
    }
    .slot-selected {
      background-color: #0d9488 !important;
      color: white !important;
      border-color: #0d9488 !important;
    }
    .cal-day:not(.cal-disabled):not(.cal-selected):hover {
      background-color: #f0fdfa;
    }
    .cal-selected {
      background-color: #0d9488;
      color: white;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen text-body">

  <!-- Header -->
  <header class="bg-white border-b border-slate-200">
    <div class="max-w-5xl mx-auto px-6 flex items-center justify-between h-16">
      <div class="flex items-center gap-2.5">
        <!-- Medical cross icon -->
        <svg class="w-7 h-7 text-primary-600 flex-shrink-0" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="10" y="2" width="8" height="24" rx="2" fill="currentColor"/>
          <rect x="2" y="10" width="24" height="8" rx="2" fill="currentColor"/>
        </svg>
        <span class="text-xl font-bold text-slate-900">ソラノ医院</span>
      </div>
      <div class="flex items-center gap-6">
        <a href="tel:03-1234-5678" class="flex items-center gap-1.5 text-sm text-body hover:text-primary-600 transition-colors">
          <svg class="w-4 h-4 flex-shrink-0" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
          </svg>
          <span>03-1234-5678</span>
        </a>
        <a href="#" class="text-sm font-medium text-primary-600 hover:text-primary-700 transition-colors">ログイン</a>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-3xl mx-auto px-8 py-12">

    <!-- Stepper -->
    <nav aria-label="予約ステップ" class="mb-10">
      <ol class="flex items-center">
        <!-- Step 1: Completed -->
        <li class="flex items-center">
          <div class="bg-primary-600 text-white w-8 h-8 rounded-full inline-flex items-center justify-center text-sm" aria-label="完了: 診療科選択">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
          </div>
          <span class="ml-2 text-sm font-medium text-primary-700 hidden sm:inline">診療科選択</span>
        </li>
        <div class="flex-1 h-0.5 mx-3 bg-primary-600" role="separator"></div>
        <!-- Step 2: Active -->
        <li class="flex items-center" aria-current="step">
          <div class="border-2 border-primary-600 text-primary-600 w-8 h-8 rounded-full inline-flex items-center justify-center text-sm font-medium">2</div>
          <span class="ml-2 text-sm font-medium text-primary-700 hidden sm:inline">日時選択</span>
        </li>
        <div class="flex-1 h-0.5 mx-3 bg-slate-200" role="separator"></div>
        <!-- Step 3: Upcoming -->
        <li class="flex items-center">
          <div class="bg-slate-100 text-slate-500 w-8 h-8 rounded-full inline-flex items-center justify-center text-sm font-medium">3</div>
          <span class="ml-2 text-sm font-medium text-slate-500 hidden sm:inline">情報入力</span>
        </li>
        <div class="flex-1 h-0.5 mx-3 bg-slate-200" role="separator"></div>
        <!-- Step 4: Upcoming -->
        <li class="flex items-center">
          <div class="bg-slate-100 text-slate-500 w-8 h-8 rounded-full inline-flex items-center justify-center text-sm font-medium">4</div>
          <span class="ml-2 text-sm font-medium text-slate-500 hidden sm:inline">確認</span>
        </li>
      </ol>
    </nav>

    <!-- Page Title -->
    <h1 class="text-3xl font-bold text-slate-900 mb-6">ご希望の日時を選択してください</h1>

    <!-- Info Alert: Selected Department -->
    <div role="status" class="flex items-start gap-3 p-4 bg-primary-50 border border-primary-200 text-primary-800 rounded-lg mb-10">
      <svg class="w-5 h-5 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <p class="text-sm font-medium">内科（一般診療）を選択中</p>
    </div>

    <!-- Calendar Section -->
    <section aria-labelledby="calendar-heading" class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm mb-8">
      <h2 id="calendar-heading" class="text-lg font-bold text-slate-900 mb-5">日付を選択</h2>

      <!-- Month Navigator -->
      <div class="flex items-center justify-between mb-4">
        <button type="button" class="w-10 h-10 inline-flex items-center justify-center rounded-lg hover:bg-gray-50 transition-colors cursor-pointer" aria-label="前の月へ">
          <svg class="w-5 h-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
          </svg>
        </button>
        <span class="text-base font-bold text-slate-900">2026年3月</span>
        <button type="button" class="w-10 h-10 inline-flex items-center justify-center rounded-lg hover:bg-gray-50 transition-colors cursor-pointer" aria-label="次の月へ">
          <svg class="w-5 h-5 text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
          </svg>
        </button>
      </div>

      <!-- Weekday Headers -->
      <div class="grid grid-cols-7 text-center mb-1">
        <span class="text-xs font-medium text-red-500 py-2">日</span>
        <span class="text-xs font-medium text-slate-500 py-2">月</span>
        <span class="text-xs font-medium text-slate-500 py-2">火</span>
        <span class="text-xs font-medium text-slate-500 py-2">水</span>
        <span class="text-xs font-medium text-slate-500 py-2">木</span>
        <span class="text-xs font-medium text-slate-500 py-2">金</span>
        <span class="text-xs font-medium text-primary-600 py-2">土</span>
      </div>

      <!-- Calendar Grid (March 2026: starts Sunday) -->
      <div class="grid grid-cols-7 text-center gap-y-1" role="grid" aria-label="2026年3月のカレンダー">
        <!-- Week 1 -->
        <button type="button" class="cal-day cal-disabled w-10 h-10 mx-auto rounded-lg text-sm text-slate-300 cursor-default" disabled aria-disabled="true">1</button>
        <button type="button" class="cal-day w-10 h-10 mx-auto rounded-lg text-sm text-slate-700 cursor-pointer">2</button>
        <button type="button" class="cal-day w-10 h-10 mx-auto rounded-lg text-sm text-slate-700 cursor-pointer">3</button>
        <button type="button" class="cal-day w-10 h-10 mx-auto rounded-lg text-sm text-slate-700 cursor-pointer">4</button>
        <button type="button" class="cal-day w-10 h-10 mx-auto rounded-lg text-sm text-slate-700 cursor-pointer">5</button>
        <button type="button" class="cal-day w-10 h-10 mx-auto rounded-lg text-sm text-slate-700 cursor-pointer">6</button>
        <button type="button" class="cal-day cal-disabled w-10 h-10 mx-auto rounded-lg text-sm text-slate-300 cursor-default" disabled aria-disabled="true">7</button>
        <!-- Week 2 -->
        <button type="button" class="cal-day cal-disabled w-10 h-10 mx-auto rounded-lg text-sm text-slate-300 cursor-default" disabled aria-disabled="true">8</button>
        <button type="button" class="cal-day w-10 h-10 mx-auto rounded-lg text-sm text-slate-700 cursor-pointer">9</button>
        <button type="button" class="cal-day w-10 h-10 mx-auto rounded-lg text-sm text-slate-700 cursor-pointer">10</button>
        <button type="button" class="cal-day w-10 h-10 mx-auto rounded-lg text-sm text-slate-700 cursor-pointer">11</button>
        <button type="button" class="cal-day w-10 h-10 mx-auto rounded-lg text-sm text-slate-700 cursor-pointer">12</button>
        <button type="button" class="cal-day cal-selected w-10 h-10 mx-auto rounded-lg text-sm font-semibold cursor-pointer" aria-pressed="true">13</button>
        <button type="button" class="cal-day cal-disabled w-10 h-10 mx-auto rounded-lg text-sm text-slate-300 cursor-default" disabled aria-disabled="true">14</button>
        <!-- Week 3 -->
        <button type="button" class="cal-day cal-disabled w-10 h-10 mx-auto rounded-lg text-sm text-slate-300 cursor-default" disabled aria-disabled="true">15</button>
        <button type="button" class="cal-day w-10 h-10 mx-auto rounded-lg text-sm text-slate-700 cursor-pointer">16</button>
        <button type="button" class="cal-day w-10 h-10 mx-auto rounded-lg text-sm text-slate-700 cursor-pointer">17</button>
        <button type="button" class="cal-day w-10 h-10 mx-auto rounded-lg text-sm text-slate-700 cursor-pointer">18</button>
        <button type="button" class="cal-day w-10 h-10 mx-auto rounded-lg text-sm text-slate-700 cursor-pointer">19</button>
        <button type="button" class="cal-day w-10 h-10 mx-auto rounded-lg text-sm text-slate-700 cursor-pointer">20</button>
        <button type="button" class="cal-day cal-disabled w-10 h-10 mx-auto rounded-lg text-sm text-slate-300 cursor-default" disabled aria-disabled="true">21</button>
        <!-- Week 4 -->
        <button type="button" class="cal-day cal-disabled w-10 h-10 mx-auto rounded-lg text-sm text-slate-300 cursor-default" disabled aria-disabled="true">22</button>
        <button type="button" class="cal-day w-10 h-10 mx-auto rounded-lg text-sm text-slate-700 cursor-pointer">23</button>
        <button type="button" class="cal-day w-10 h-10 mx-auto rounded-lg text-sm text-slate-700 cursor-pointer">24</button>
        <button type="button" class="cal-day w-10 h-10 mx-auto rounded-lg text-sm text-slate-700 cursor-pointer">25</button>
        <button type="button" class="cal-day w-10 h-10 mx-auto rounded-lg text-sm text-slate-700 cursor-pointer">26</button>
        <button type="button" class="cal-day w-10 h-10 mx-auto rounded-lg text-sm text-slate-700 cursor-pointer">27</button>
        <button type="button" class="cal-day cal-disabled w-10 h-10 mx-auto rounded-lg text-sm text-slate-300 cursor-default" disabled aria-disabled="true">28</button>
        <!-- Week 5 -->
        <button type="button" class="cal-day cal-disabled w-10 h-10 mx-auto rounded-lg text-sm text-slate-300 cursor-default" disabled aria-disabled="true">29</button>
        <button type="button" class="cal-day w-10 h-10 mx-auto rounded-lg text-sm text-slate-700 cursor-pointer">30</button>
        <button type="button" class="cal-day w-10 h-10 mx-auto rounded-lg text-sm text-slate-700 cursor-pointer">31</button>
        <span></span><span></span><span></span><span></span>
      </div>

      <p class="text-xs text-slate-500 mt-3">日曜・祝日は休診日のため選択できません</p>
    </section>

    <!-- Time Slot Section -->
    <section aria-labelledby="time-heading" class="bg-white rounded-xl border border-slate-200 p-6 shadow-sm mb-8">
      <h2 id="time-heading" class="text-lg font-bold text-slate-900 mb-5">時間帯を選択</h2>

      <!-- AM / PM Radio Group -->
      <fieldset class="mb-6">
        <legend class="text-sm font-medium text-slate-900 mb-3">診療時間帯</legend>
        <div class="flex gap-4 leading-normal">
          <label class="flex items-center gap-2 px-4 py-2.5 rounded-lg border border-primary-200 bg-primary-50 cursor-pointer">
            <input type="radio" name="period" value="am" checked class="w-4 h-4">
            <span class="text-sm font-medium text-slate-900">午前（9:00 - 12:00）</span>
          </label>
          <label class="flex items-center gap-2 px-4 py-2.5 rounded-lg border border-slate-200 hover:bg-gray-50 transition-colors cursor-pointer">
            <input type="radio" name="period" value="pm" class="w-4 h-4">
            <span class="text-sm font-medium text-slate-900">午後（14:00 - 17:30）</span>
          </label>
        </div>
      </fieldset>

      <!-- AM Time Slots -->
      <div id="am-slots" class="leading-normal">
        <p class="text-sm font-medium text-slate-500 mb-3">午前の空き枠</p>
        <div class="grid grid-cols-4 sm:grid-cols-6 gap-2">
          <button type="button" class="slot-btn h-10 rounded-lg border border-slate-200 text-sm font-medium text-slate-700 cursor-pointer transition-colors">9:00</button>
          <button type="button" class="slot-btn h-10 rounded-lg border border-slate-200 text-sm font-medium text-slate-700 cursor-pointer transition-colors">9:30</button>
          <button type="button" class="slot-btn slot-unavailable h-10 rounded-lg border border-slate-200 text-sm text-slate-300 cursor-default bg-gray-50" disabled aria-disabled="true" aria-label="10:00 予約不可">
            <span class="flex items-center justify-center gap-1">10:00 <span class="text-xs">&times;</span></span>
          </button>
          <button type="button" class="slot-btn slot-selected h-10 rounded-lg border text-sm font-medium cursor-pointer transition-colors" aria-pressed="true">10:30</button>
          <button type="button" class="slot-btn h-10 rounded-lg border border-slate-200 text-sm font-medium text-slate-700 cursor-pointer transition-colors">11:00</button>
          <button type="button" class="slot-btn slot-unavailable h-10 rounded-lg border border-slate-200 text-sm text-slate-300 cursor-default bg-gray-50" disabled aria-disabled="true" aria-label="11:30 予約不可">
            <span class="flex items-center justify-center gap-1">11:30 <span class="text-xs">&times;</span></span>
          </button>
        </div>
      </div>

      <!-- PM Time Slots (hidden by default) -->
      <div id="pm-slots" class="hidden leading-normal">
        <p class="text-sm font-medium text-slate-500 mb-3">午後の空き枠</p>
        <div class="grid grid-cols-4 sm:grid-cols-6 gap-2">
          <button type="button" class="slot-btn h-10 rounded-lg border border-slate-200 text-sm font-medium text-slate-700 cursor-pointer transition-colors">14:00</button>
          <button type="button" class="slot-btn h-10 rounded-lg border border-slate-200 text-sm font-medium text-slate-700 cursor-pointer transition-colors">14:30</button>
          <button type="button" class="slot-btn h-10 rounded-lg border border-slate-200 text-sm font-medium text-slate-700 cursor-pointer transition-colors">15:00</button>
          <button type="button" class="slot-btn slot-unavailable h-10 rounded-lg border border-slate-200 text-sm text-slate-300 cursor-default bg-gray-50" disabled aria-disabled="true" aria-label="15:30 予約不可">
            <span class="flex items-center justify-center gap-1">15:30 <span class="text-xs">&times;</span></span>
          </button>
          <button type="button" class="slot-btn h-10 rounded-lg border border-slate-200 text-sm font-medium text-slate-700 cursor-pointer transition-colors">16:00</button>
          <button type="button" class="slot-btn h-10 rounded-lg border border-slate-200 text-sm font-medium text-slate-700 cursor-pointer transition-colors">16:30</button>
          <button type="button" class="slot-btn slot-unavailable h-10 rounded-lg border border-slate-200 text-sm text-slate-300 cursor-default bg-gray-50" disabled aria-disabled="true" aria-label="17:00 予約不可">
            <span class="flex items-center justify-center gap-1">17:00 <span class="text-xs">&times;</span></span>
          </button>
          <button type="button" class="slot-btn h-10 rounded-lg border border-slate-200 text-sm font-medium text-slate-700 cursor-pointer transition-colors">17:30</button>
        </div>
      </div>

      <p class="text-xs text-slate-500 mt-4 flex items-center gap-1.5">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <span>&times; の枠は既に予約が埋まっています</span>
      </p>
    </section>

    <!-- Divider -->
    <hr class="border-t border-slate-200 mb-8" role="separator">

    <!-- Navigation Buttons -->
    <div class="flex items-center justify-between">
      <button type="button" class="inline-flex items-center justify-center gap-2 h-12 px-6 text-[1rem] font-medium bg-white text-slate-700 border border-slate-200 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
        戻る
      </button>
      <button type="button" class="inline-flex items-center justify-center gap-2 h-12 px-6 text-[1rem] font-medium bg-primary-600 text-white rounded-lg hover:bg-primary-700 cursor-pointer transition-colors">
        次へ進む
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
        </svg>
      </button>
    </div>

  </main>

  <!-- Footer -->
  <footer class="bg-white border-t border-slate-200 mt-14">
    <div class="max-w-3xl mx-auto px-8 py-8">
      <div class="flex items-center justify-between text-xs text-slate-500">
        <div class="flex items-center gap-2">
          <svg class="w-5 h-5 text-primary-600 flex-shrink-0" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="10" y="2" width="8" height="24" rx="2" fill="currentColor"/>
            <rect x="2" y="10" width="24" height="8" rx="2" fill="currentColor"/>
          </svg>
          <span class="font-medium text-slate-900">ソラノ医院</span>
        </div>
        <span>&copy; 2026 ソラノ医院</span>
      </div>
    </div>
  </footer>

  <script>
    // Calendar day selection
    document.querySelectorAll('.cal-day:not(.cal-disabled)').forEach(day => {
      day.addEventListener('click', () => {
        document.querySelectorAll('.cal-day').forEach(d => {
          d.classList.remove('cal-selected', 'font-semibold');
          d.removeAttribute('aria-pressed');
          if (!d.classList.contains('cal-disabled')) {
            d.classList.add('text-slate-700');
          }
        });
        day.classList.add('cal-selected', 'font-semibold');
        day.classList.remove('text-slate-700');
        day.setAttribute('aria-pressed', 'true');
      });
    });

    // AM/PM radio toggle
    document.querySelectorAll('input[name="period"]').forEach(radio => {
      radio.addEventListener('change', () => {
        const amSlots = document.getElementById('am-slots');
        const pmSlots = document.getElementById('pm-slots');
        const labels = radio.closest('fieldset').querySelectorAll('label');
        labels.forEach(l => {
          l.classList.remove('border-primary-200', 'bg-primary-50');
          l.classList.add('border-slate-200');
        });
        radio.closest('label').classList.add('border-primary-200', 'bg-primary-50');
        radio.closest('label').classList.remove('border-slate-200');
        if (radio.value === 'am') {
          amSlots.classList.remove('hidden');
          pmSlots.classList.add('hidden');
        } else {
          amSlots.classList.add('hidden');
          pmSlots.classList.remove('hidden');
        }
      });
    });

    // Time slot selection
    document.querySelectorAll('.slot-btn:not(.slot-unavailable)').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.slot-btn').forEach(b => {
          b.classList.remove('slot-selected');
          b.removeAttribute('aria-pressed');
          if (!b.classList.contains('slot-unavailable')) {
            b.classList.add('border-slate-200', 'text-slate-700');
          }
        });
        btn.classList.add('slot-selected');
        btn.classList.remove('border-slate-200', 'text-slate-700');
        btn.setAttribute('aria-pressed', 'true');
      });
    });
  </script>
</body>
</html>
